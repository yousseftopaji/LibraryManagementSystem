syntax = "proto3";
option java_multiple_files = true;
option csharp_namespace = "GrpcService.Protos";

package dk.via.sep3;

message DTOBook {
  string title = 1;
  string author = 2;
  string isbn = 3;
  string state = 4;
}

message GetAllBooksRequest {
}

message GetAllBooksResponse {
  repeated DTOBook books = 1;
}

message GetBookRequest {
  int32 id = 1;
}

message GetBookResponse {
DTOBook book = 1;
}

message CreateLoanRequest {
  int32 bookId = 1;    
}

message CreateLoanResponse {
  bool success = 1;
  string message = 2;
}

service BookService {
  rpc GetAllBooks (GetAllBooksRequest) returns (GetAllBooksResponse);
  rpc GetBookById (GetBookRequest) returns (GetBookResponse);
  rpc CreateLoan (CreateLoanRequest) returns (CreateLoanResponse);
}