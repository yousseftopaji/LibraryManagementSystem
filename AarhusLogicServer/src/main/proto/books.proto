syntax = "proto3";
package dk.via.sep3.proto;

service LibraryService {
  rpc GetBookByIsbn (GetBookByIsbnRequest) returns (GetBookByIsbnResponse);
  rpc CreateLoan (CreateLoanRequestGrpc) returns (CreateLoanResponse);
  rpc ReserveBook (CreateReservationRequestGrpc) returns (CreateReservationResponse);
}

message GetBookByIsbnRequest { string isbn = 1; }
message GetBookByIsbnResponse { BookGrpc book = 1; }

message CreateLoanRequestGrpc { string username = 1; string isbn = 2; }
message CreateLoanResponse { LoanGrpc loan = 1; }

message CreateReservationRequestGrpc { string username = 1; string isbn = 2; }
message CreateReservationResponse { ReservationGrpc reservation = 1; }

message BookGrpc {
  string isbn = 1;
  string title = 2;
  string author = 3;
  string genre = 4;
  string state = 5; // "AVAILABLE" | "BORROWED"
}

message LoanGrpc {
  string id = 1;
  string username = 2;
  string isbn = 3;
  string borrowDate = 4;  // yyyy-MM-dd
  string dueDate = 5;     // yyyy-MM-dd
  bool returned = 6;
  int32 numberOfExtensions = 7;
}

message ReservationGrpc {
  string id = 1;
  string username = 2;
  string isbn = 3;
  int32 numberInLine = 4;
  string createdAt = 5;   // yyyy-MM-dd'T'HH:mm:ss
}
